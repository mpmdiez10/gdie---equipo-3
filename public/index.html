<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <title>Práctica GDIE - Equipo 3</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/rxjs/7.5.6/rxjs.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vtt.js/0.13.0/vtt.min.js"></script>
    <script src="js/event-bus.js" type="module"></script>
    <script src="js/web_components/piano-component.js" defer></script>
    <script src="js/web_components/video-component.js" defer></script>
    <script src="js/web_components/sheet-component.js" defer></script>    
    <script src="js/web_components/recommendations-component.js" defer></script>    
    
    <!-- Scribe music -->
    <script title="load">
        document.documentElement.className += ' js loading';
        window.addEventListener('load', () => window.requestAnimationFrame(() => document.documentElement.classList.remove('loading')));
        window.DEBUG = true;
    </script>

    <!-- Import <scribe-music> -->
    <link rel="stylesheet" href="https://stephen.band/scribe/scribe-music/module.css" />
    <script type="module" src="https://stephen.band/scribe/scribe-music/module.js"></script>
</head>
<body>
    <main>
        <div class="container container-video">
            <video-component song="imagine"></video-component>
        </div>
        <div class="container container-sheets">
            <sheet-component></sheet-component>
        </div>
        <div class="container container-piano">
            <piano-component notes=""></piano-component>
        </div>
        <div class="container container-recomendations">
            <recommendations-component></recommendations-component>
        </div>
    </main>
    <script src="js/libraries/jquery-3.7.1.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/sheets.js"></script>
</body>
</html>
