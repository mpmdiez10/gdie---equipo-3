<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="css/style.css">

    <title>Práctica GDIE - Equipo 3</title>

    <script src="js/web_components/piano-component.js" defer></script>
    
    <!-- Scribe music -->
    <script title="load">
        document.documentElement.className += ' js loading';
        window.addEventListener('load', () => window.requestAnimationFrame(() => document.documentElement.classList.remove('loading')));
        window.DEBUG = true;
    </script>

    <!-- Import <scribe-music> -->

        <div class="container container-video"></div>
        <div class="container container-sheets">
            <button onclick="cargarSheets()">Btn</button>
        </div>
        <div class="container container-piano">
            <piano-component notes="C,E,G,C#"></piano-component>
            <button onclick="random()">Random</button>
        </div>
        <div class="container container-recomendations"></div>
    </main>
    <script src="js/libraries/jquery-3.7.1.min.js"></script>
